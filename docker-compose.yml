version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: tango_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: tangodb
    volumes:
      - mongo_data:/data/db
    networks:
      - tango_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tango_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    networks:
      - tango_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # image: kapilsharma763/tango-backend:latest
    container_name: tango_backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app          # hot-reload: local edits → container
      - /app/node_modules       # keep container's node_modules isolated
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tango_net
    expose:
      - "4000"

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    # image: kapilsharma763/tango-chat-service:latest
    container_name: tango_chat
    restart: unless-stopped
    env_file: ./chat-service/.env
    volumes:
      - ./chat-service:/app
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tango_net
    expose:
      - "5000"

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    # image: kapilsharma763/tango-payment-service:latest
    container_name: tango_payment
    restart: unless-stopped
    env_file: ./payment-service/.env
    volumes:
      - ./payment-service:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - tango_net
    expose:
      - "6000"

  streaming-server:
    build:
      context: ./streaming-server
      dockerfile: Dockerfile
    # image: kapilsharma763/tango-streaming-server:latest
    container_name: tango_streaming
    restart: unless-stopped
    env_file: ./streaming-server/.env
    volumes:
      - ./streaming-server:/app
      - /app/node_modules
    networks:
      - tango_net
    expose:
      - "7880"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # image: kapilsharma763/tango-frontend:latest
    container_name: tango_frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    volumes:
      - ./frontend:/app         # next dev picks up file changes instantly
      - /app/node_modules
      - /app/.next              # isolate Next.js build cache
    depends_on:
      - backend
      - chat-service
    networks:
      - tango_net
    expose:
      - "3000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    # image: kapilsharma763/tango-nginx:latest
    container_name: tango_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Mount config directly — changes take effect with just `docker compose restart nginx`
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - chat-service
      - payment-service
      - streaming-server
    networks:
      - tango_net

volumes:
  mongo_data:
  redis_data:

networks:
  tango_net:
    driver: bridge
