upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:4000;
}

upstream chat_upstream {
    server chat-service:5000;
}

upstream payment_upstream {
    server payment-service:6000;
}

upstream streaming_upstream {
    server streaming-server:7880;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50M;

    # Backend API
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Chat Service (Socket.IO)  — /ws-chat/ avoids conflict with Next.js routes
    location /ws-chat/ {
        proxy_pass http://chat_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Payment Service
    location /payment/ {
        proxy_pass http://payment_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Streaming / WebRTC signaling (Socket.IO) — /ws-stream/ avoids conflict with Next.js /stream/ pages
    location /ws-stream/ {
        proxy_pass http://streaming_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Frontend (Next.js) — must be last, catches everything else
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
